services:
  # ── Database ─────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Cache / Broker ───────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Temporal ─────────────────────────────────────────────────
  temporal:
    image: temporalio/auto-setup:latest
    restart: always
    environment:
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PWD=${POSTGRES_PASSWORD}
      - POSTGRES_SEEDS=postgres
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
    depends_on:
      postgres:
        condition: service_healthy

  # ── Django Backend ───────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    restart: always
    env_file: .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.prod
      - POSTGRES_HOST=postgres
      - REDIS_URL=redis://redis:6379/0
      - TEMPORAL_HOST=temporal:7233
    volumes:
      - media_uploads:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 120"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api/v1/health/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Temporal Worker ──────────────────────────────────────────
  temporal-worker:
    build:
      context: .
      dockerfile: docker/temporal-worker.Dockerfile
    restart: always
    env_file: .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.prod
      - POSTGRES_HOST=postgres
      - REDIS_URL=redis://redis:6379/0
      - TEMPORAL_HOST=temporal:7233
    depends_on:
      - temporal
      - postgres
      - redis

  # ── Blog Frontend ────────────────────────────────────────────
  blog:
    build:
      context: .
      dockerfile: docker/blog.Dockerfile
    restart: always
    environment:
      - NEXT_PUBLIC_API_URL=${PUBLIC_API_URL:-http://localhost/api/v1}
      - NEXT_PUBLIC_SITE_URL=${PUBLIC_SITE_URL:-http://localhost}
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Admin Frontend ───────────────────────────────────────────
  admin:
    build:
      context: .
      dockerfile: docker/admin.Dockerfile
    restart: always
    environment:
      - NEXT_PUBLIC_API_URL=${PUBLIC_API_URL:-http://localhost/api/v1}
      - NEXT_PUBLIC_SITE_URL=${PUBLIC_ADMIN_URL:-http://localhost/admin-panel}
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3001/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Nginx Reverse Proxy ──────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      blog:
        condition: service_healthy
      admin:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/nginx-health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  media_uploads:
